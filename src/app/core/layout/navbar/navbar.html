<mat-toolbar class="navbar">
  <!-- Brand -->
  <button class="brand" (click)="scrollTo('hero')">Julien Desrosiers</button>

  <!-- Desktop anchor nav -->
  <nav class="nav-links" aria-label="Navigation principale">
    @for (item of navItems; track item.fragment) {
      <button
        class="nav-link"
        [class.active]="isActive(item.fragment)"
        (click)="scrollTo(item.fragment)"
      >
        <span class="nav-index">{{ item.index }}</span>
        <span class="nav-sep">.</span>
        <span class="nav-label">{{ lang.t(item.labelEn, item.labelFr) }}</span>
        <span class="nav-cursor" aria-hidden="true">_</span>
      </button>
    }
  </nav>

  <span class="spacer"></span>

  <!-- Lang toggle -->
  <button
    class="lang-btn"
    [matTooltip]="lang.t('Switch to French', 'Switch to English')"
    (click)="lang.toggle()"
  >
    <span class="lang-label">{{ lang.t('FR', 'EN') }}</span>
  </button>

  <!-- Palette picker -->
  <button mat-icon-button [matMenuTriggerFor]="paletteMenu" matTooltip="Change palette">
    <mat-icon>palette</mat-icon>
  </button>

  <!-- Theme toggle -->
  <button
    mat-icon-button
    [matTooltip]="theme.isDark() ? 'Switch to light' : 'Switch to dark'"
    (click)="theme.toggle()"
  >
    <mat-icon>{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
</mat-toolbar>

<mat-menu #paletteMenu="matMenu">
  <div class="palette-grid" (click)="$event.stopPropagation()">
    @for (name of palettes; track name) {
      <button
        [class]="'swatch palette-' + name"
        [class.active]="theme.palette() === name"
        [matTooltip]="paletteName(name)"
        matTooltipPosition="above"
        (click)="theme.setPalette(name)"
      ></button>
    }
  </div>
</mat-menu>
