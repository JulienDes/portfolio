name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test:coverage

      - name: Code Coverage
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/angular-21-standalone-template/coverage-summary.json
          json-final-path: coverage/angular-21-standalone-template/coverage-final.json

      - name: Coverage summary
        run: |
          node -e "
            const fs = require('fs');
            const raw = fs.readFileSync('coverage/angular-21-standalone-template/coverage-summary.json', 'utf8');
            const total = JSON.parse(raw).total;
            const thresholds = { Lines: 80, Branches: 70, Functions: 70, Statements: 80 };
            const metrics = [
              ['Lines',      total.lines.pct],
              ['Branches',   total.branches.pct],
              ['Functions',  total.functions.pct],
              ['Statements', total.statements.pct],
            ];
            const rows = metrics.map(([name, pct]) => {
              const threshold = thresholds[name];
              const status = pct >= threshold ? '✅' : '❌';
              return \`| \${name} | \${pct}% | \${threshold}% | \${status} |\`;
            }).join('\n');
            const table = [
              '## Coverage Summary',
              '| Metric | Coverage | Threshold | Status |',
              '|--------|----------|-----------|--------|',
              rows,
            ].join('\n');
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, table + '\n');
          "
