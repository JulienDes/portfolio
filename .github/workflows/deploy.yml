name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build -- --base-href "/${{ github.event.repository.name }}/"

      - name: Add 404 redirect for SPA routing
        run: cp dist/angular-21-standalone-template/browser/index.html dist/angular-21-standalone-template/browser/404.html

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/angular-21-standalone-template/browser
